name: fleet-send

# Install a firmware version on a device / all / a kind (the OTA push). One of the per-action PlanePuck
# ops workflows — copy to `.github/workflows/fleet-send.yml` in your PRIVATE repo.
# Secrets: MQTT_HOST, MQTT_OPERATOR_USER, MQTT_OPERATOR_PASS.
on:
  workflow_dispatch:
    inputs:
      target:
        description: 'device CODE (8 hex) | all | kind (test/prod/xyz)'
        required: true
      version:
        description: 'firmware version integer to install'
        required: true
      board:
        description: 'restrict an all/kind target to this board id — optional'
        required: false
      force:
        description: 'silent flash (no on-device Update/Later confirm)'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: johnalexander404/planepuck-fw   # <- change if you forked the firmware repo
          sparse-checkout: tools
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq mosquitto-clients
      - name: fleet.py send
        env:
          FLEET_HOST: ${{ secrets.MQTT_HOST }}
          FLEET_PORT: '8883'
          FLEET_USER: ${{ secrets.MQTT_OPERATOR_USER }}
          FLEET_PASS: ${{ secrets.MQTT_OPERATOR_PASS }}
          TARGET: ${{ inputs.target }}
          VERSION: ${{ inputs.version }}
          BOARD: ${{ inputs.board }}
          FORCE: ${{ inputs.force }}
        run: |
          if [ -z "${FLEET_PASS:-}" ] || [ -z "${FLEET_HOST:-}" ]; then
            echo "::error::set MQTT_HOST + MQTT_OPERATOR_USER + MQTT_OPERATOR_PASS secrets in THIS repo"; exit 1
          fi
          if [ -z "$TARGET" ] || [ -z "$VERSION" ]; then echo "::error::send needs target + version"; exit 1; fi
          ARGS=(send "$TARGET" "$VERSION")
          [ -n "$BOARD" ] && ARGS+=(--board "$BOARD")
          [ "$FORCE" = "true" ] && ARGS+=(--force)
          python3 tools/fleet.py "${ARGS[@]}"          # each device resolves its own board's bin (board-safe)
