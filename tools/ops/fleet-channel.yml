name: fleet-channel

# Set ONE device's kind/channel (retained). `test`/`beta` see all builds; any other kind sees released
# only. One of the per-action PlanePuck ops workflows — copy to `.github/workflows/fleet-channel.yml`.
# Secrets: MQTT_HOST, MQTT_OPERATOR_USER, MQTT_OPERATOR_PASS.
on:
  workflow_dispatch:
    inputs:
      code:
        description: '8-hex device code'
        required: true
      kind:
        description: 'kind to set: test / beta (see all builds) | prod | any [a-z0-9_-]{2,16}'
        required: true

permissions:
  contents: read

jobs:
  channel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: johnalexander404/planepuck-fw   # <- change if you forked the firmware repo
          sparse-checkout: tools
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq mosquitto-clients
      - name: fleet.py channel
        env:
          FLEET_HOST: ${{ secrets.MQTT_HOST }}
          FLEET_PORT: '8883'
          FLEET_USER: ${{ secrets.MQTT_OPERATOR_USER }}
          FLEET_PASS: ${{ secrets.MQTT_OPERATOR_PASS }}
          CODE: ${{ inputs.code }}
          KIND: ${{ inputs.kind }}
        run: |
          if [ -z "${FLEET_PASS:-}" ] || [ -z "${FLEET_HOST:-}" ]; then
            echo "::error::set MQTT_HOST + MQTT_OPERATOR_USER + MQTT_OPERATOR_PASS secrets in THIS repo"; exit 1
          fi
          if [ -z "$CODE" ] || [ -z "$KIND" ]; then echo "::error::channel needs code + kind"; exit 1; fi
          python3 tools/fleet.py channel "$CODE" "$KIND"
