name: enroll-admin

# PRIVATE enroll pin-store admin for PlanePuck — SEPARATE from fleet.yml on purpose.
#
# fleet.yml uses the MQTT operator account (broker, ACL-confined). THIS workflow instead needs DROPLET
# SSH (a more powerful credential: it edits a root-only file and runs `sudo python3`), so it's split out
# and carries ONLY the SSH secrets — the fleet workflow never touches an SSH key, and this one never
# touches the MQTT account.
#
# Copy this file to `.github/workflows/enroll-admin.yml` in your PRIVATE repo (e.g. `planepuck-ops`).
# It pulls tools/enroll-admin.py from the PUBLIC firmware repo and runs it against your droplet.
#
# Required secrets in THIS (private) repo:
#   ENROLL_SSH       = user@droplet  (root, or a NOPASSWD sudoer that can run python3)
#   ENROLL_SSH_KEY   = a private SSH key authorized for that droplet user
# `unpin <code>` clears a code's enroll pin so a factory-reset/erased puck (new key -> 403 key mismatch)
# can re-enroll; `pins` lists pinned codes. See tools/OTA-SETUP.md "Security model".
on:
  workflow_dispatch:
    inputs:
      command:
        description: 'pins (list) | unpin (clear one code)'
        type: choice
        options: [pins, unpin]
        default: pins
        required: true
      code:
        description: 'unpin: the 8-hex device code to clear'
        required: false

permissions:
  contents: read

jobs:
  enroll-admin:
    runs-on: ubuntu-latest
    steps:
      - name: Get enroll-admin.py from the public firmware repo
        uses: actions/checkout@v4
        with:
          repository: johnalexander404/planepuck-fw   # <- change if you forked the firmware repo
          sparse-checkout: tools

      - name: Set up droplet SSH
        env:
          ENROLL_SSH: ${{ secrets.ENROLL_SSH }}
          ENROLL_SSH_KEY: ${{ secrets.ENROLL_SSH_KEY }}
        run: |
          if [ -z "${ENROLL_SSH:-}" ] || [ -z "${ENROLL_SSH_KEY:-}" ]; then
            echo "::error::set ENROLL_SSH (user@droplet) + ENROLL_SSH_KEY secrets in THIS repo"; exit 1
          fi
          install -d -m 700 ~/.ssh
          printf '%s\n' "$ENROLL_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${ENROLL_SSH##*@}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: enroll-admin.py ${{ inputs.command }}
        env:
          ENROLL_SSH: ${{ secrets.ENROLL_SSH }}
          CMD: ${{ inputs.command }}
          CODE: ${{ inputs.code }}
        run: |
          case "$CMD" in
            pins)
              python3 tools/enroll-admin.py pins ;;
            unpin)
              if [ -z "$CODE" ]; then echo "::error::unpin needs the device code"; exit 1; fi
              python3 tools/enroll-admin.py unpin "$CODE" ;;
            *) echo "::error::unknown command '$CMD'"; exit 1 ;;
          esac
