name: fleet-sync-channels

# Bulk-set channel markers from the FLEET_GROUPS secret: mark every code in the `test` list `test`, and
# demote any other reporting device to `prod` (retained). One of the per-action PlanePuck ops workflows —
# copy to `.github/workflows/fleet-sync-channels.yml`. No inputs; edit the FLEET_GROUPS secret to change
# membership, then re-run. Secrets: MQTT_HOST, MQTT_OPERATOR_USER, MQTT_OPERATOR_PASS, FLEET_GROUPS.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync-channels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: johnalexander404/planepuck-fw   # <- change if you forked the firmware repo
          sparse-checkout: tools
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq mosquitto-clients
      - name: fleet.py sync-channels
        env:
          FLEET_HOST: ${{ secrets.MQTT_HOST }}
          FLEET_PORT: '8883'
          FLEET_USER: ${{ secrets.MQTT_OPERATOR_USER }}
          FLEET_PASS: ${{ secrets.MQTT_OPERATOR_PASS }}
          FLEET_GROUPS: ${{ secrets.FLEET_GROUPS }}
        run: |
          if [ -z "${FLEET_PASS:-}" ] || [ -z "${FLEET_HOST:-}" ]; then
            echo "::error::set MQTT_HOST + MQTT_OPERATOR_USER + MQTT_OPERATOR_PASS secrets in THIS repo"; exit 1
          fi
          if [ -z "${FLEET_GROUPS:-}" ]; then echo "::error::sync-channels needs the FLEET_GROUPS secret"; exit 1; fi
          python3 tools/fleet.py sync-channels
