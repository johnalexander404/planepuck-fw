[env:m5stack-cores3]
platform = espressif32
board = m5stack-cores3
framework = arduino
monitor_speed = 115200
; Pin the OTA-capable layout (otadata + app0/app1 + spiffs). Already the board default, so this
; is NOT a partition migration — it just guards against a future platform bump changing it under
; a fleet that now relies on OTA. Never point this at a single-app scheme once devices ship.
board_build.partitions = default_16MB.csv
; Inject the git build id (FW_BUILD, e.g. "v19-rc2") so a device can tell RC builds apart — same
; version int, different candidate. See tools/buildinfo.py.
extra_scripts = pre:tools/buildinfo.py
lib_deps =
    m5stack/M5Unified
    knolleary/PubSubClient
    bblanchon/ArduinoJson
