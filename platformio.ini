[platformio]
default_envs = m5stack-cores3

; Shared config. Each env adds its own board sources (boards/<id>/*.cpp via build_src_filter) and
; include dirs; the puck:: HAL (src/hal) is board-agnostic.
[env]
framework        = arduino
monitor_speed    = 115200
; Pin the OTA-capable layout (otadata + app0/app1 + spiffs). Already the board default, so this
; is NOT a partition migration — it just guards against a future platform bump changing it under
; a fleet that now relies on OTA. Never point this at a single-app scheme once devices ship.
board_build.partitions = default_16MB.csv
; Inject the git build id (FW_BUILD, e.g. "v19-rc2") so a device can tell RC builds apart. tools/buildinfo.py.
extra_scripts    = pre:tools/buildinfo.py
lib_deps =
    knolleary/PubSubClient
    bblanchon/ArduinoJson

; ---- M5Stack CoreS3 (incumbent; env name kept so CI / .pio paths don't move) ----
[env:m5stack-cores3]
platform         = espressif32
board            = m5stack-cores3
build_src_filter = +<*> +<../boards/m5cores3/>
build_flags      = -Isrc -Iboards/m5cores3 -D PUCK_BOARD_M5CORES3 -D PUCK_HAS_PSRAM=1
lib_deps =
    ${env.lib_deps}
    m5stack/M5Unified

; ---- Waveshare ESP32-S3-Touch-LCD-1.85C-BOX (N16R8) — stubs only until the board is on hand ----
[env:waveshare_185c_box]
platform         = espressif32
board            = esp32-s3-devkitc-1            ; generic; Waveshare ships no boards.txt entry
board_build.flash_mode = qio
board_build.psram_type = opi                     ; 16 MB flash + 8 MB octal PSRAM
build_src_filter = +<*> +<../boards/waveshare_1_85c_box/>
build_flags      = -Isrc -Iboards/waveshare_1_85c_box
                   -D PUCK_BOARD_WAVESHARE_185C_BOX -D PUCK_HAS_PSRAM=1
                   -D BOARD_HAS_PSRAM -D ARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
    ${env.lib_deps}
    lovyan03/LovyanGFX
